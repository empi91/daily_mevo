name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy type check
        run: uv run mypy .

      - name: Run tests
        run: uv run pytest -v
        env:
          MEVO_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          MEVO_JWT_SECRET: ci-test-secret

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Deploy to Mikr.us
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MIKRUS_SERVER }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.MIKRUS_SSH_PORT }}
          script: |
            docker tag app-app:latest app-app:prev 2>/dev/null || echo 'No existing image to tag'
            cd /app && git pull
            cd /app && docker compose build
            cd /app && docker compose up -d

      - name: Wait for health check
        run: |
          echo "Waiting for deployment to be healthy..."
          for i in $(seq 1 18); do
            sleep 5
            HEALTH=$(curl -sf "${{ secrets.SMOKE_BASE_URL }}/health" 2>/dev/null || echo "")
            if echo "$HEALTH" | grep -q '"status":"ok"'; then
              echo "Health check passed!"
              echo "$HEALTH"
              exit 0
            fi
            echo "Attempt $i/18 — not healthy yet..."
          done
          echo "Health check failed after 90s!"
          exit 1

      - name: Run smoke tests
        run: uv run pytest -m smoke -v
        env:
          MEVO_SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
